<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaquat Tech Studio | Certificate Verification</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #ffffff;
  width: 95%;
  max-width: 500px;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  text-align: center;
}

h1 {
  margin: 0;
  color: #0f2027;
}

.subtitle {
  font-size: 14px;
  color: #555;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 15px;
  font-size: 14px;
  transition: 0.3s;
}

input:focus {
  border-color: #2c5364;
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #2c5364;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #203a43;
}

#resultCard {
  margin-top: 25px;
  padding: 20px;
  border-radius: 15px;
  display: none;
  text-align: left;
  background: #f8f9fa;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.status {
  font-weight: bold;
  margin-bottom: 10px;
  font-size: 16px;
}

.verified {
  color: #0a7d33;
}

.invalid {
  color: #c0392b;
}

.description {
  font-size: 14px;
  margin-top: 10px;
  color: #333;
}

footer {
  margin-top: 20px;
  font-size: 12px;
  color: #777;
}

footer a {
  text-decoration: none;
  color: #2c5364;
}
</style>
</head>

<body>

<div class="container">
  <h1>Liaquat Tech Studio</h1>
  <div class="subtitle">Official Certificate Verification Portal</div>

  <input type="text" id="didInput" placeholder="Enter your DID (Example: DID-BC-202600-000)">
  <button onclick="verifyDID()">Verify Certificate</button>

  <div id="resultCard">
    <div id="resultStatus" class="status"></div>
    <p><strong>Student Name:</strong> <span id="resultName"></span></p>
    <p><strong>Certificate ID:</strong> <span id="resultDID"></span></p>
    <p><strong>Course:</strong> <span id="resultCourse"></span></p>
    <div id="resultDescription" class="description"></div>
  </div>

  <footer>
    © <span id="year"></span> Liaquat Tech Studio | All Rights Reserved
  </footer>
</div>

<script>
document.getElementById("year").innerText = new Date().getFullYear();

const jsonUrl = 'studentdit.json?v=' + new Date().getTime(); // Prevent caching

async function verifyDID() {

  const input = document.getElementById("didInput").value.trim().toUpperCase();
  const resultCard = document.getElementById("resultCard");
  const status = document.getElementById("resultStatus");
  const name = document.getElementById("resultName");
  const did = document.getElementById("resultDID");
  const course = document.getElementById("resultCourse");
  const desc = document.getElementById("resultDescription");

  if (!input) {
    alert("Please enter your DID.");
    return;
  }

  status.innerText = "Checking...";
  status.className = "status";
  resultCard.style.display = "block";

  try {

    const response = await fetch(jsonUrl);
    const data = await response.json();

    const student = data.find(s => s.did.trim().toUpperCase() === input);

    if (student) {

      status.innerText = "✔ VERIFIED CERTIFICATE";
      status.classList.add("verified");

      name.innerText = student.name;
      did.innerText = student.did;
      course.innerText = student.course;

      desc.innerHTML = `
        Congratulations <strong>${student.name}</strong>! 🎉<br><br>
        This certificate confirms the successful completion of the 
        <strong>${student.course}</strong> program at Liaquat Tech Studio.
        <br><br>
        The credential is officially issued and can be verified anytime 
        using the unique Certificate ID mentioned above.
        <br><br>
        We wish you continued success in your professional journey.
      `;

    } else {

      status.innerText = "✖ INVALID CERTIFICATE";
      status.classList.add("invalid");

      name.innerText = "";
      did.innerText = "";
      course.innerText = "";

      desc.innerHTML = `
        The provided Certificate ID could not be found in our official records.
        <br><br>
        Please check the DID carefully and try again.
      `;
    }

  } catch (error) {
    alert("Unable to load student database. Please ensure studentdit.json is uploaded correctly.");
    console.error(error);
  }
}
</script>

</body>
  </html>
