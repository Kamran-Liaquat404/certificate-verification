<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaquat Tech Studio - Certificate Verification</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 0;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    color: #fff;
  }
  .container {
    background: #1b2735;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    width: 90%; max-width: 450px;
    text-align: center;
  }
  h1 { color: #00e5ff; margin-bottom: 5px; font-size: 28px; }
  p.subtitle { color: #a0f7ff; font-size: 14px; margin: 5px 0 20px; }

  input[type="text"] {
    width: 90%; padding: 12px;
    border-radius: 8px; border: none;
    margin-bottom: 15px; font-size: 14px;
  }
  button {
    padding: 12px 25px; background: linear-gradient(90deg, #00e5ff, #0072ff);
    color: white; border: none; border-radius: 8px;
    cursor: pointer; font-size: 14px; transition: 0.3s;
  }
  button:hover { background: linear-gradient(90deg, #0072ff, #00e5ff); }

  h3#result {
    margin-top: 20px;
    font-size: 16px;
    padding: 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
  }

  footer {
    margin-top: 25px;
    font-size: 12px;
    color: #a0f7ff;
  }
  footer a {
    color: #00e5ff;
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }

  /* Responsive */
  @media (max-width: 480px) {
    h1 { font-size: 22px; }
    button { width: 100%; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Liaquat Tech Studio</h1>
  <p class="subtitle">Founder: Kamran Liaquat</p>
  <p class="subtitle">Verify your certificate instantly</p>

  <input type="text" id="didInput" placeholder="Enter your DID e.g. DID-BC-00000-000">
  <br>
  <button onclick="verifyDID()">Verify Certificate</button>

  <h3 id="result"></h3>

  <footer>
    Contact WhatsApp: <a href="https://wa.me/923303638383" target="_blank">03303638383</a> | 
    Facebook: <a href="https://www.facebook.com/share/184BKQrrki/" target="_blank">Liaquat Tech Studio</a>
  </footer>
</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/1cIfJ3FMoRi1wThjZBza6xEth0f9X56LjVcLTHem6Yf4/gviz/tq?tqx=out:csv";

async function verifyDID() {
  const input = document.getElementById("didInput").value.replace(/"/g,'').trim();
  const result = document.getElementById("result");

  if(!input) {
    result.innerHTML = "❌ Please enter DID";
    result.style.color = "#ff6b6b";
    return;
  }

  try {
    const response = await fetch(csvUrl);
    const data = await response.text();

    const rows = data.split("\n").slice(1); // skip header
    // map DID column (ignore quotes & spaces)
    const didList = rows.map(r => r.split(",")[6]?.replace(/"/g,'').trim());

    if(didList.includes(input)) {
      const row = rows.find(r => r.split(",")[6]?.replace(/"/g,'').trim() === input);
      const details = row.split(",");
      result.innerHTML = `✅ VERIFIED<br>Name: ${details[1]}<br>Course: ${details[3]}`;
      result.style.color = "#00ff99";
      result.style.background = "rgba(0,255,153,0.1)";
    } else {
      result.innerHTML = "❌ INVALID CERTIFICATE";
      result.style.color = "#ff6b6b";
      result.style.background = "rgba(255,107,107,0.1)";
    }

  } catch (error) {
    result.innerHTML = "❌ Error fetching data";
    result.style.color = "#ff6b6b";
    console.error(error);
  }
}

// Optional: Auto-fill DID from URL (for QR code)
const urlParams = new URLSearchParams(window.location.search);
const didParam = urlParams.get('id');
if(didParam) {
  document.getElementById("didInput").value = didParam.replace(/"/g,'').trim();
  verifyDID();
}
</script>

</body>
</html>
