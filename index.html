<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaquat Tech Studio - Certificate Verification</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 0;
    background: linear-gradient(to bottom right, #e0f7fa, #ffffff);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .container {
    background: white; padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    width: 90%; max-width: 400px;
    text-align: center;
  }
  h1 { color: #004d40; margin-bottom: 5px; font-size: 24px; }
  p.subtitle { color: #00796b; font-size: 14px; margin: 5px 0 20px; }

  input[type="text"] {
    width: 90%; padding: 12px;
    border-radius: 8px; border: 1px solid #b2dfdb;
    margin-bottom: 15px; font-size: 14px;
  }
  button {
    padding: 12px 25px; background-color: #00796b;
    color: white; border: none; border-radius: 8px;
    cursor: pointer; font-size: 14px; transition: 0.3s;
  }
  button:hover { background-color: #004d40; }

  h3#result { margin-top: 20px; font-size: 16px; }
  footer { margin-top: 25px; font-size: 12px; color: #555; }
  footer a { color: #00796b; text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
  <h1>Liaquat Tech Studio</h1>
  <p class="subtitle">Founder: Kamran Liaquat</p>
  <p class="subtitle">Verify your certificate instantly</p>

  <input type="text" id="didInput" placeholder="Enter your DID e.g. DID-BC-20260303-001">
  <br>
  <button onclick="verifyDID()">Verify Certificate</button>

  <h3 id="result"></h3>

  <footer>
    Contact WhatsApp: <a href="https://wa.me/923303638383" target="_blank">03303638383</a> | 
    Facebook: <a href="https://www.facebook.com/share/184BKQrrki/" target="_blank">Liaquat Tech Studio</a>
  </footer>
</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/1cIfJ3FMoRi1wThjZBza6xEth0f9X56LjVcLTHem6Yf4/gviz/tq?tqx=out:csv";

async function verifyDID() {
  const input = document.getElementById("didInput").value.trim();
  const result = document.getElementById("result");

  if(!input) {
    result.innerHTML = "❌ Please enter DID";
    result.style.color = "red";
    return;
  }

  try {
    const response = await fetch(csvUrl);
    const data = await response.text();

    const rows = data.split("\n").slice(1); // skip header
    const didList = rows.map(r => r.split(",")[6].trim());

    if(didList.includes(input)) {
      const row = rows.find(r => r.split(",")[6].trim() === input);
      const details = row.split(",");
      result.innerHTML = `✅ VERIFIED<br>Name: ${details[1]}<br>Course: ${details[3]}`;
      result.style.color = "green";
    } else {
      result.innerHTML = "❌ INVALID CERTIFICATE";
      result.style.color = "red";
    }

  } catch (error) {
    result.innerHTML = "❌ Error fetching data";
    result.style.color = "red";
    console.error(error);
  }
}

// Optional: Auto-fill DID from URL (for QR code)
const urlParams = new URLSearchParams(window.location.search);
const didParam = urlParams.get('id');
if(didParam) {
  document.getElementById("didInput").value = didParam;
  verifyDID();
}
</script>

</body>
  </html>
