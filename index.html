<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaquat Tech Studio | Official Certificate Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =====================
   EASY EDIT SECTION
===================== */
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --success:#16a34a;
  --danger:#dc2626;
  --bg:#0f172a;
  --card:rgba(255,255,255,0.07);
  --text:#e2e8f0;
  --muted:#94a3b8;
}
/* ===================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
  color:var(--text);
}

/* Container Animation */
.container{
  width:100%;
  max-width:500px;
  padding:35px 25px;
  border-radius:22px;
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  text-align:center;
  font-size:clamp(20px,4vw,24px);
  font-weight:700;
}

.subtitle{
  text-align:center;
  font-size:13px;
  margin:8px 0 25px;
  color:var(--muted);
}

/* Input */
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);
  color:#fff;
  font-size:14px;
  margin-bottom:18px;
  transition:0.3s;
}

input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,0.2);
}

/* Button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

button:active{
  transform:scale(0.97);
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

/* Loader */
.loader{
  width:18px;
  height:18px;
  border:3px solid #fff;
  border-top:3px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:none;
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
}

@keyframes spin{
  to{ transform:translateY(-50%) rotate(360deg); }
}

/* Result Card */
#resultCard{
  margin-top:25px;
  padding:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  display:none;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.status{
  font-size:15px;
  font-weight:600;
  margin-bottom:12px;
}

.verified{ color:var(--success); }
.invalid{ color:var(--danger); }

#resultCard p{
  font-size:14px;
  margin:6px 0;
}

.description{
  margin-top:12px;
  font-size:13px;
  line-height:1.6;
  color:var(--muted);
}

footer{
  text-align:center;
  margin-top:25px;
  font-size:12px;
  color:var(--muted);
}

@media(max-width:400px){
  .container{ padding:25px 18px; }
}

</style>
</head>

<body>

<div class="container">

<h1>Liaquat Tech Studio</h1>
<div class="subtitle">Official Digital Certificate Verification</div>

<input type="text"
       id="didInput"
       placeholder="Enter Certificate ID (DID-BC-202600-000)">

<button id="verifyBtn">
Verify Certificate
<div class="loader" id="loader"></div>
</button>

<div id="resultCard">
<div id="resultStatus" class="status"></div>
<p><strong>Name:</strong> <span id="resultName"></span></p>
<p><strong>Certificate ID:</strong> <span id="resultDID"></span></p>
<p><strong>Course:</strong> <span id="resultCourse"></span></p>
<div id="resultDescription" class="description"></div>
</div>

<footer>
© <span id="year"></span> Liaquat Tech Studio
</footer>

</div>

<script>

/* ===== Editable Settings ===== */
const SETTINGS={
  institutionName:"Liaquat Tech Studio",
  databaseFile:"studentdit.json"
};
/* ============================= */

document.getElementById("year").innerText=new Date().getFullYear();

const input=document.getElementById("didInput");
const button=document.getElementById("verifyBtn");
const loader=document.getElementById("loader");

const status=document.getElementById("resultStatus");
const nameEl=document.getElementById("resultName");
const didEl=document.getElementById("resultDID");
const courseEl=document.getElementById("resultCourse");
const desc=document.getElementById("resultDescription");
const card=document.getElementById("resultCard");

button.addEventListener("click",verifyDID);
input.addEventListener("keypress",e=>{
if(e.key==="Enter") verifyDID();
});

async function verifyDID(){

const value=input.value.trim().toUpperCase();

if(!value){
alert("Please enter Certificate ID");
return;
}

button.disabled=true;
loader.style.display="block";

status.innerText="Verifying record...";
status.className="status";
card.style.display="block";

try{

const response=await fetch(SETTINGS.databaseFile+"?v="+Date.now());
const data=await response.json();

const student=data.find(s=>s.did.toUpperCase()===value);

if(student){

status.innerText="✔ CERTIFICATE VERIFIED";
status.classList.add("verified");

nameEl.innerText=student.name;
didEl.innerText=student.did;
courseEl.innerText=student.course;

desc.innerText=
"This certificate is officially issued and recognized by "+SETTINGS.institutionName+
". The credential is valid under institutional records.";

}else{

status.innerText="✖ CERTIFICATE NOT FOUND";
status.classList.add("invalid");

nameEl.innerText="";
didEl.innerText="";
courseEl.innerText="";

desc.innerText=
"The provided Certificate ID does not exist in our official database.";

}

}catch(error){
alert("Database file not found.");
console.error(error);
}

loader.style.display="none";
button.disabled=false;

}

</script>

</body>
   </html>
