<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaquat Tech Studio | Certificate Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ========================
   ROOT VARIABLES (EDIT HERE)
======================== */
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --success:#22c55e;
  --danger:#ef4444;
  --bg-dark:#0f172a;
  --card-bg:rgba(255,255,255,0.07);
  --text-light:#e2e8f0;
  --text-muted:#94a3b8;
}

/* ======================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
  color:var(--text-light);
}

.container{
  width:100%;
  max-width:500px;
  padding:30px 25px;
  border-radius:22px;
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  transition:0.3s ease;
}

h1{
  font-size:clamp(20px,4vw,24px);
  font-weight:700;
  text-align:center;
}

.subtitle{
  text-align:center;
  font-size:13px;
  margin:10px 0 25px;
  color:var(--text-muted);
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);
  color:#fff;
  font-size:14px;
  margin-bottom:18px;
  transition:0.3s;
}

input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,0.2);
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  background:var(--primary);
  color:#fff;
  transition:0.3s;
}

button:hover{
  background:var(--primary-dark);
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

/* RESULT CARD */
#resultCard{
  margin-top:25px;
  padding:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  display:none;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.status{
  font-size:15px;
  font-weight:600;
  margin-bottom:12px;
}

.verified{ color:var(--success); }
.invalid{ color:var(--danger); }

#resultCard p{
  font-size:14px;
  margin:6px 0;
}

.description{
  margin-top:12px;
  font-size:13px;
  line-height:1.6;
  color:var(--text-muted);
}

footer{
  text-align:center;
  margin-top:25px;
  font-size:12px;
  color:var(--text-muted);
}

@media(max-width:400px){
  .container{
    padding:25px 18px;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>Liaquat Tech Studio</h1>
<div class="subtitle">Official Certificate Verification Portal</div>

<input type="text"
       id="didInput"
       placeholder="Enter Certificate ID (DID-BC-202600-000)">

<button id="verifyBtn">Verify Certificate</button>

<div id="resultCard">
<div id="resultStatus" class="status"></div>
<p><strong>Name:</strong> <span id="resultName"></span></p>
<p><strong>Certificate ID:</strong> <span id="resultDID"></span></p>
<p><strong>Course:</strong> <span id="resultCourse"></span></p>
<div id="resultDescription" class="description"></div>
</div>

<footer>
© <span id="year"></span> Liaquat Tech Studio
</footer>

</div>

<script>

/* ========================
   EASY EDIT SETTINGS
======================== */
const SETTINGS={
  institutionName:"Liaquat Tech Studio",
  databaseFile:"studentdit.json"
};
/* ======================== */

document.getElementById("year").innerText=new Date().getFullYear();

const elements={
  input:document.getElementById("didInput"),
  button:document.getElementById("verifyBtn"),
  card:document.getElementById("resultCard"),
  status:document.getElementById("resultStatus"),
  name:document.getElementById("resultName"),
  did:document.getElementById("resultDID"),
  course:document.getElementById("resultCourse"),
  desc:document.getElementById("resultDescription")
};

elements.button.addEventListener("click",verifyDID);
elements.input.addEventListener("keypress",e=>{
  if(e.key==="Enter") verifyDID();
});

async function verifyDID(){

const inputValue=elements.input.value.trim().toUpperCase();

if(!inputValue){
alert("Please enter Certificate ID");
return;
}

elements.button.disabled=true;
elements.status.innerText="Checking database...";
elements.status.className="status";
elements.card.style.display="block";

try{

const response=await fetch(SETTINGS.databaseFile+"?v="+Date.now());
const data=await response.json();

const student=data.find(s=>s.did.toUpperCase()===inputValue);

if(student){

elements.status.innerText="✔ VERIFIED CERTIFICATE";
elements.status.classList.add("verified");

elements.name.innerText=student.name;
elements.did.innerText=student.did;
elements.course.innerText=student.course;

elements.desc.innerText=
"This certificate is officially issued and verified by "+SETTINGS.institutionName+
;

}else{

elements.status.innerText="✖ INVALID CERTIFICATE";
elements.status.classList.add("invalid");

elements.name.innerText="";
elements.did.innerText="";
elements.course.innerText="";
elements.desc.innerText=
"The provided Certificate ID was not found in our official records.";
}

}catch(error){
alert("Database file missing. Upload "+SETTINGS.databaseFile);
console.error(error);
}

elements.button.disabled=false;
}

</script>

</body>
</html>
