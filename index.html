<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaquat Tech Studio - Certificate Verification</title>
<style>
/* --- Global Styles --- */
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #1de9b6, #00bfa5);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* --- Container --- */
.container {
  background: #ffffff;
  padding: 35px 30px;
  border-radius: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  width: 100%;
  max-width: 450px;
  text-align: center;
  transition: transform 0.3s;
}
.container:hover {
  transform: translateY(-5px);
}

/* --- Header --- */
h1 {
  color: #00796b;
  font-size: 28px;
  margin-bottom: 5px;
}
p.subtitle {
  color: #004d40;
  font-size: 14px;
  margin: 3px 0 20px;
}

/* --- Input & Button --- */
input[type="text"] {
  width: 90%;
  padding: 14px;
  border-radius: 12px;
  border: 2px solid #b2dfdb;
  font-size: 15px;
  margin-bottom: 20px;
  transition: border-color 0.3s;
}
input[type="text"]:focus {
  border-color: #00796b;
  outline: none;
}

button {
  padding: 14px 28px;
  font-size: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #00796b, #1de9b6);
  color: white;
  cursor: pointer;
  transition: all 0.4s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}
button:hover {
  background: linear-gradient(45deg, #1de9b6, #00796b);
  transform: scale(1.05);
}

/* --- Result Card --- */
.result-card {
  background: #e0f2f1;
  padding: 20px;
  border-radius: 18px;
  margin-top: 20px;
  text-align: left;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}
.result-card h3 {
  margin-bottom: 10px;
  color: green;
}
.result-card p {
  margin: 5px 0;
  line-height: 1.4;
}

/* --- Download Button --- */
#downloadBtn {
  margin-top: 15px;
  display: none;
  padding: 14px 28px;
  font-size: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #ff5722, #ff9800);
  color: white;
  cursor: pointer;
  transition: all 0.4s;
}
#downloadBtn:hover {
  transform: scale(1.05);
  background: linear-gradient(45deg, #ff9800, #ff5722);
}

/* --- Footer --- */
footer {
  margin-top: 25px;
  font-size: 12px;
  color: #004d40;
}
footer a {
  color: #00796b;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<div class="container">
  <h1>Liaquat Tech Studio</h1>
  <p class="subtitle">Founder: Kamran Liaquat</p>
  <p class="subtitle">Verify your certificate instantly</p>

  <input type="text" id="didInput" placeholder="Enter your DID e.g. DID-BC-2026000-000">
  <br>
  <button onclick="verifyDID()">Verify Certificate</button>

  <div id="resultContainer"></div>
  <button id="downloadBtn" onclick="downloadCertificate()">Download Certificate</button>

  <footer>
    Contact WhatsApp: <a href="https://wa.me/923303638383" target="_blank">03303638383</a> | 
    Facebook: <a href="https://www.facebook.com/share/184BKQrrki/" target="_blank">Liaquat Tech Studio</a>
  </footer>
</div>

<script>
// ===== JSON File URL =====
const jsonUrl = "studentdit.json"; // JSON file me sab student records rahenge
let students = [];

// Fetch student records from JSON
fetch(jsonUrl)
  .then(response => response.json())
  .then(data => { students = data; })
  .catch(err => console.error("Error loading JSON:", err));

// ===== Verify DID =====
function verifyDID() {
  const inputDID = document.getElementById('didInput').value.trim();
  const container = document.getElementById('resultContainer');
  const downloadBtn = document.getElementById('downloadBtn');
  downloadBtn.style.display = "none";
  container.innerHTML = "";

  if (!inputDID) {
    container.innerHTML = `<p style="color:red;">❌ Please enter DID</p>`;
    return;
  }

  const student = students.find(s => s.did === inputDID);
  if(student) {
    // Single description for all courses
    const commonDescription = "This certifies that the student has successfully completed their AI & Cybersecurity course at Liaquat Tech Studio under Founder Kamran Liaquat. Their dedication and skills have been recognized with this certificate.";
    
    container.innerHTML = `
      <div class="result-card">
        <h3>✅ VERIFIED</h3>
        <p><strong>Name:</strong> ${student.name}</p>
        <p><strong>DID:</strong> ${student.did}</p>
        <p><strong>Course:</strong> ${student.course}</p>
        <p><strong>Description:</strong> ${commonDescription}</p>
      </div>
    `;
    downloadBtn.style.display = "inline-block";
    downloadBtn.dataset.did = student.did;
  } else {
    container.innerHTML = `<p style="color:red;">❌ INVALID CERTIFICATE</p>`;
  }
}

// ===== Placeholder: Download PDF Function =====
function downloadCertificate() {
  const did = document.getElementById('downloadBtn').dataset.did;
  alert(`PDF download for ${did} will be enabled after integration.`);
}
</script>

</body>
                           </html>
