
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaquat Tech Studio - Certificate Verification</title>
<style>
/* --- Global Styles --- */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(to bottom right, #e0f7fa, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* --- Container Card --- */
.container {
  background: white;
  padding: 30px 25px;
  border-radius: 20px;
  box-shadow: 0 12px 25px rgba(0,0,0,0.15);
  width: 95%;
  max-width: 450px;
  text-align: center;
  transition: 0.3s all ease;
}

.container:hover {
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

/* --- Header --- */
h1 {
  color: #004d40;
  font-size: 26px;
  margin-bottom: 5px;
}

p.subtitle {
  color: #00796b;
  font-size: 14px;
  margin: 3px 0 20px;
}

/* --- Input & Button --- */
input[type="text"] {
  width: 90%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #b2dfdb;
  margin-bottom: 15px;
  font-size: 14px;
}

button {
  padding: 12px 25px;
  background-color: #00796b;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.3s;
}

button:hover {
  background-color: #004d40;
}

/* --- Result Card --- */
.result-card {
  background: #e0f2f1;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  text-align: left;
  font-size: 14px;
}

.result-card h3 {
  margin: 0 0 10px 0;
  color: green;
}

.result-card p {
  margin: 5px 0;
}

/* --- Download Button --- */
#downloadBtn {
  margin-top: 15px;
  display: none;
  padding: 12px 25px;
  background-color: #ff5722;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
}

#downloadBtn:hover {
  background-color: #e64a19;
}

/* --- Footer --- */
footer {
  margin-top: 25px;
  font-size: 12px;
  color: #555;
}
footer a {
  color: #00796b;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}

</style>
</head>
<body>

<div class="container">
  <h1>Liaquat Tech Studio</h1>
  <p class="subtitle">Founder: Kamran Liaquat</p>
  <p class="subtitle">Verify your certificate instantly</p>

  <input type="text" id="didInput" placeholder="Enter your DID e.g. DID-BC-000000-000">
  <br>
  <button onclick="verifyDID()">Verify Certificate</button>

  <!-- Result will appear here -->
  <div id="resultContainer"></div>

  <!-- Download Certificate Button -->
  <button id="downloadBtn" onclick="downloadCertificate()">Download Certificate</button>

  <footer>
    Contact WhatsApp: <a href="https://wa.me/923303638383" target="_blank">03303638383</a> | 
    Facebook: <a href="https://www.facebook.com/share/184BKQrrki/" target="_blank">Liaquat Tech Studio</a>
  </footer>
</div>

<!-- JS Placeholder for future JSON connection -->

function verifyDID() {
  alert("This will verify DID after connecting JSON data.");
}
function downloadCertificate() {
  alert("This will download certificate as PDF after connecting JSON data.");
}
</script>

</body>
</html>
